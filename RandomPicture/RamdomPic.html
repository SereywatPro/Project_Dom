<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width
    , initial-scale=1.0">
    <title>RandomPicture</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            background-color:rgb(180, 178, 178);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .img-container{
            text-align: center;
        }
        .img-container img{
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, .3);
            width: 300px;
            height: 300px;
        }
        .btn{
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            background-color: rgb(255, 230, 0);

        }
        .btn:active{
            opacity: 0.8;
            cursor: pointer;
            transform: scale(0.9);
            
        }
    </style>
</head>

<body>
    <div class="img-container">
        <img class="image" src="https://picsum.photos/300?random=1">
        <img class="image" src="https://picsum.photos/300?random=2">
        <img class="image" src="https://picsum.photos/300?random=3">
        <img class="image" src="https://picsum.photos/300?random=4">
        <img class="image" src="https://picsum.photos/300?random=5">
        <img class="image" src="https://picsum.photos/300?random=6">
    </div>
    <button class="btn">Next</button>
</body>
    <script src="RanPic.js"></script>
</html>
