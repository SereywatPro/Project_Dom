<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add to Cart with Modal and Off-Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product-info {
            padding: 15px;
            text-align: center;
        }

        .product-info h3 {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #333;
        }

        .product-info p {
            color: #777;
            margin-bottom: 10px;
        }

        .add-to-cart-btn {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1em;
            transition: background-color 0.3s;
        }

        .add-to-cart-btn:hover {
            background-color: #218838;
        }

        /* Modal */
        .modal-toggle {
            display: none;
        }

        .modal-toggle:checked~.product-modal {
            display: block;
        }

        .modal-link {
            text-decoration: none;
            color: #007bff;
            font-size: 0.9em;
            display: block;
            margin-top: 5px;
        }

        .product-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 5px;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5em;
            color: #333;
            text-decoration: none;
        }

        /* Off-Canvas Cart */
        .cart-toggle {
            display: none;
        }

        .cart-toggle:checked~.off-canvas {
            transform: translateX(0);
        }

        .cart-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            z-index: 500;
        }

        .off-canvas {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0.2);
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
            padding: 20px;
            z-index: 1000;
        }

        .off-canvas h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .cart-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            margin-right: 10px;
            border-radius: 5px;
        }

        .cart-item p {
            flex-grow: 1;
            font-size: 0.9em;
            color: #333;
        }

        .close-cart {
            display: block;
            text-align: center;
            background: #dc3545;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <!-- Product Grid -->
    <div class="product-grid">
        <!-- Product Card 1 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x200" alt="Product 1">
            <div class="product-info">
                <h3>Product 1</h3>
                <p>$19.99</p>
                <a href="#cart" class="add-to-cart-btn">Add to Cart</a>
                <label for="modal-1" class="modal-link">View Details</label>
            </div>
        </div>
        <!-- Product Card 2 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x200" alt="Product 2">
            <div class="product-info">
                <h3>Product 2</h3>
                <p>$29.99</p>
                <a href="#cart" class="add-to-cart-btn">Add to Cart</a>
                <label for="modal-2" class="modal-link">View Details</label>
            </div>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/250x200" alt="Product 2">
            <div class="product-info">
                <h3>Product 2</h3>
                <p>$29.99</p>
                <a href="#cart" class="add-to-cart-btn">Add to Cart</a>
                <label for="modal-2" class="modal-link">View Details</label>
            </div>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/250x200" alt="Product 2">
            <div class="product-info">
                <h3>Product 2</h3>
                <p>$29.99</p>
                <a href="#cart" class="add-to-cart-btn">Add to Cart</a>
                <label for="modal-2" class="modal-link">View Details</label>
            </div>
        </div>
    </div>

   

    <!-- Off-Canvas Cart -->
    <label for="cart-toggle" class="cart-btn">View Cart</label>
    <input type="checkbox" id="cart-toggle" class="cart-toggle">
    <div class="off-canvas">
        <h2>Shopping Cart</h2>
        <div class="cart-item">
            <img src="https://via.placeholder.com/50" alt="Product 1">
            <p>Product 1 - $19.99</p>
        </div>
        <div class="cart-item">
            <img src="https://via.placeholder.com/50" alt="Product 2">
            <p>Product 2 - $29.99</p>
        </div>
        <label for="cart-toggle" class="close-cart">Close Cart</label>
    </div>
    
</body>

</html>
