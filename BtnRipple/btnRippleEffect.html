<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ButtonRipple_Ef</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: chocolate;
        }
        .btn{
            padding: 10px 40px;
            text-decoration: none;
            background-color: chartreuse;
            color: rgb(0, 0, 0);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,.3);
            position: relative;
            overflow: hidden;
        }
        .btn span{
            position: relative;
            z-index: 1;
        }
        .btn::before{
            content: "";
            position: absolute;
            background-color: cyan;
            width: 0px;
            height: 0px;
            left: var(--xP);
            top: var(--yP);
            transform: translate(-50%,-50%);
            border-radius: 50%;
            transition: width .5s, height .5s;
            
            
        }
        .btn:hover::before{
            width: 300px;
            height: 300px;
        }

    </style>
</head>
<body>
    <a href="#" class="btn">
    <span>Button</span></a>
</body>
<script src="BtnRipple.js"></script>
</html>
