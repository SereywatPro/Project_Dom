<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <title>Time</title>
</head>
<body>

    <main class="py-5">
        <section>
            <div class="container">
                <div class="card">
                    <h5 class="card-header text-center">
                        Time Run
                    </h5>
                    <div class="card-body d-flex justify-content-center text-center">
                        <div class="fs-1" id="hour"></div>
                        <div class="fs-1" id="min"></div>
                        <div class="fs-1" id="second"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>
        // all of these are UTC that covert to GMT for fit in local like (asian)
        const  getH = document.getElementById('hour');
        const getM = document.getElementById('min');
        const getSecond = document.getElementById('second');

        
        setInterval(()=>{
            const currentDay = new Date();
            getH.innerText =  currentDay.getHours() < 10 ? "0" : "" + currentDay.getHours() + 'H :';
            getM.innerText = `${currentDay.getMinutes() < 10 ? "0" : "" + currentDay.getMinutes()} M :`;
            getSecond.innerText = `${currentDay.getSeconds() < 10 ? "0" : "" + currentDay.getSeconds()} S`;
        }, 1000);


    </script>
</body>
</html>
